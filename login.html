<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Glow & Relax</title>
    <meta name="description" content="Login or create an account to book premium wellness & beauty appointments at Glow & Relax.">
    <link rel="stylesheet" href="style.css">
</head>

<body class="auth-page">

    <div class="login-container">
        <div class="login-box">
            <div class="logo-area">
                <a href="index.html" class="back-link">← Back to Home</a>
                <h2 id="authTitle">Welcome Back</h2>
                <p id="authSubtitle">Please enter your details to continue</p>
            </div>

            <!-- Auth Tab Toggle (Login / Sign Up) -->
            <div class="role-toggle" id="authToggle">
                <button id="loginTabBtn" class="active" onclick="switchAuthTab('login')">Login</button>
                <button id="signupTabBtn" onclick="switchAuthTab('signup')">Sign Up</button>
            </div>

            <!-- LOGIN FORM -->
            <form id="loginForm">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="hello@example.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="submit-btn">Login</button>
            </form>

            <!-- SIGN UP FORM (hidden by default) -->
            <form id="signupForm" style="display: none;">
                <div class="input-group">
                    <label for="signupEmail">Email Address</label>
                    <input type="email" id="signupEmail" placeholder="hello@example.com" required>
                </div>

                <div class="input-group">
                    <label for="signupPassword">Password</label>
                    <input type="password" id="signupPassword" placeholder="••••••••" required>
                </div>

                <div class="input-group">
                    <label for="signupConfirm">Confirm Password</label>
                    <input type="password" id="signupConfirm" placeholder="••••••••" required>
                </div>

                <button type="submit" class="submit-btn">Create Account</button>
            </form>

            <!-- Auth feedback message -->
            <p id="authMessage" class="auth-message"></p>

            <p class="signup-prompt" id="switchPrompt">Don't have an account? <a href="#"
                    onclick="switchAuthTab('signup'); return false;">Sign up</a></p>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
